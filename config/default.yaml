# =============================================================================
# Auton 配置文件
# =============================================================================
# 配置加载优先级（后者覆盖前者）：
#   CLI args > 环境变量 > .auton/config.yaml（项目） > ~/.auton/config.yaml（用户） > 本文件
#
# 使用方式：
#   - 全局生效：复制到 ~/.auton/config.yaml
#   - 项目生效：复制到 your-project/.auton/config.yaml
# =============================================================================

# ─── LLM 配置 ──────────────────────────────────────────────────────────────

llm:
  # LLM Provider: anthropic / openai / ollama / minimax
  #   - anthropic: Anthropic Claude 系列（默认）
  #   - minimax: MiniMax M2/M2.1 系列
  #   - openai: OpenAI GPT 系列
  #   - ollama: 本地 Ollama 模型
  provider: anthropic

  # 模型名称
  #   Anthropic: claude-sonnet-4-20250514 / claude-opus-4-20250514 / claude-3-5-sonnet-...
  #   MiniMax:   MiniMax-M2.7 / MiniMax-M2.1-32K / MiniMax-M2.1-128K
  #   OpenAI:    gpt-4o / gpt-4-turbo / gpt-3.5-turbo
  model: claude-sonnet-4-20250514

  # API Key（优先使用环境变量 ANTHROPIC_API_KEY / MINIMAX_API_KEY / OPENAI_API_KEY）
  api_key: null

  # API 基础地址（Ollama / MiniMax 等需要配置）
  #   MiniMax 示例: https://api.minimax.chat/v1
  #   Ollama 示例:  http://localhost:11434/v1
  base_url: null

  # 最大输出 Token 数
  max_tokens: 8192

  # 采样温度，0.0~1.0，越低越确定
  #   0.0 = 几乎确定性输出（推荐编程）
  #   0.7 = 适度随机
  #   1.0 = 高度随机
  temperature: 0.0

  # 请求超时时间（秒）
  timeout: 60.0


# ─── 记忆配置 ──────────────────────────────────────────────────────────────

memory:
  # 记忆存储根目录
  storage_dir: ~/.auton/memory

  # 向量检索：chroma / qdrant
  vector_store: chroma

  # Chroma 向量数据库路径
  vector_db_path: ~/.auton/memory/vector_db

  # 分块大小（Token）
  chunk_size: 500

  # 分块重叠（Token）
  chunk_overlap: 50


# ─── 心跳配置 ──────────────────────────────────────────────────────────────

heartbeat:
  # 是否启用心跳
  enabled: false

  # 心跳间隔：5m / 30m / 1h / 2h
  every: 30m

  # 活跃时间段（在此时间段内心跳生效）
  # 格式：HH:MM-HH:MM，null 表示始终生效
  active_hours: null  # 示例: "9:00-18:00"

  # 心跳模式：
  #   main     = 打断主会话进行主动建议
  #   isolated = 独立会话轮次，不打断
  session_mode: main

  # 是否使用轻量上下文（减少 token 消耗）
  light_context: true

  # 心跳目标：main / isolated / current
  target: main


# ─── 定时任务配置 ──────────────────────────────────────────────────────────

cron:
  # 是否启用定时任务
  enabled: false

  # 任务定义文件
  jobs_file: ~/.auton/cron/jobs.yaml

  # 日志目录
  logs_dir: ~/.auton/cron/logs


# ─── 安全配置 ──────────────────────────────────────────────────────────────

security:
  # 权限模式：
  #   default = 默认，每次危险操作需确认
  #   auto    = 自动执行，但记录审计日志
  #   bypass  = 跳过所有确认
  #   yolo    = 完全跳过权限检查（危险！）
  permission_mode: default

  # 是否启用审计日志
  audit_enabled: true

  # 是否启用沙箱
  sandbox_enabled: true

  # bash 命令最大超时（秒）
  max_bash_timeout: 60

  # 允许操作的路径列表（为空表示无限制）
  allowed_paths: []


# ─── 日志配置 ──────────────────────────────────────────────────────────────

log:
  # 日志级别：DEBUG / INFO / WARNING / ERROR / CRITICAL
  level: INFO

  # 日志文件目录
  log_dir: ~/.auton/logs

  # 是否输出到文件
  enable_file: true

  # 是否输出到控制台
  enable_console: true


# ─── MCP 配置 ──────────────────────────────────────────────────────────────

mcp:
  # 启动时自动初始化所有 MCP Server
  auto_start: true

  servers: []
